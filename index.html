<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mars Cafe — Kadıköy</title>
<meta name="description" content="Mars Cafe Kadıköy — Menü, sadakat kartı ve daha fazlası.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200;12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:       #D4B57E;
  --gold-light: #ECD5A4;
  --gold-dim:   rgba(212,181,126,0.15);
  --gold-border:rgba(212,181,126,0.22);
  --bg:         #111111;
  --card:       #1d1813;
  --muted:      rgba(255,255,255,0.38);
  --font: 'Bricolage Grotesque', system-ui, -apple-system, sans-serif;
}

html, body {
  min-height: 100dvh;
  background: var(--bg);
  color: #fff;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}

/* subtle radial glow at top, same as card */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% -10%, rgba(212,181,126,0.10) 0%, transparent 55%);
  pointer-events: none;
}

.page {
  position: relative; z-index: 1;
  min-height: 100dvh;
  max-width: 380px;
  margin: 0 auto;
  padding: 52px 24px 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
}

/* ---- LOGO ---- */
.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.logo-wrap img {
  width: 200px;
  max-width: 62vw;
  display: block;
}

/* ---- LANG SWITCHER ---- */
.lang {
  display: flex;
  align-items: center;
  gap: 0;
  border: 1px solid var(--gold-border);
  border-radius: 999px;
  overflow: hidden;
  background: rgba(255,255,255,0.04);
}
.lang button {
  background: none; border: none; cursor: pointer;
  font-family: var(--font); font-size: 12px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
  padding: 8px 18px;
  transition: background .15s, color .15s;
}
.lang button.active {
  background: var(--gold);
  color: #1d1813;
  font-weight: 600;
}

/* ---- MENU BUTTON ---- */
.btn-menu {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px 24px;
  background: var(--gold);
  color: #1d1813;
  border-radius: 14px;
  text-decoration: none;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: opacity .15s;
}
.btn-menu:hover { opacity: .88; }
.btn-menu:active { opacity: .72; }
.btn-menu svg { width: 17px; height: 17px; flex: 0 0 auto; }

/* ---- ACTION LIST ---- */
.actions {
  width: 100%;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--gold-border);
  border-radius: 16px;
  overflow: hidden;
  background: var(--card);
}
.action-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 18px;
  text-decoration: none;
  color: #fff;
  font-size: 14px;
  font-weight: 400;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: background .12s;
}
.action-row:last-child { border-bottom: none; }
.action-row:hover { background: rgba(212,181,126,0.07); }

.action-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--gold-dim);
  border: 1px solid var(--gold-border);
  display: flex; align-items: center; justify-content: center;
  flex: 0 0 auto;
}
.action-icon svg { width: 16px; height: 16px; color: var(--gold); }

.action-label { flex: 1; }
.action-chevron { color: var(--muted); }
.action-chevron svg { width: 15px; height: 15px; display: block; }

/* ---- FOOTER ---- */
footer {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  letter-spacing: 0.08em;
  line-height: 1.7;
}
footer a { color: var(--gold); text-decoration: none; opacity: .8; }
</style>
</head>
<body>
<div class="page">

  <!-- LOGO -->
  <div class="logo-wrap">
    <!-- Файл mars_transparent.png должен лежать рядом с index.html в репо -->
    <img src="mars_transparent.png" alt="Mars Cafe">

    <!-- LANG под логотипом -->
    <div class="lang" role="group" aria-label="Language">
      <button class="active" onclick="setLang('tr')" id="btn-tr">TR</button>
      <button onclick="setLang('en')" id="btn-en">EN</button>
    </div>
  </div>

  <!-- MENU CTA -->
  <a class="btn-menu" href="https://menu.marsespresso.com" id="btn-menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="1"/>
      <path d="M9 12h6M9 16h4"/>
    </svg>
    <span id="label-menu">Menüyü Gör</span>
  </a>

  <!-- SECONDARY ACTIONS -->
  <div class="actions">

    <a class="action-row" href="https://www.instagram.com/marsespresso" target="_blank" rel="noopener">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="5"/>
          <circle cx="17.5" cy="6.5" r=".8" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <span class="action-label" id="label-ig">Instagram</span>
      <div class="action-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
    </a>

    <a class="action-row" href="https://card.marsespresso.com" target="_blank" rel="noopener">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <path d="M2 10h20M6 15h4"/>
        </svg>
      </div>
      <span class="action-label" id="label-loyalty">Sadakat kartı</span>
      <div class="action-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
    </a>

    <a class="action-row" href="https://g.page/r/CbFormK82YJZEAE/review" target="_blank" rel="noopener">
      <div class="action-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 3l2.7 5.5 6 .9-4.3 4.2 1 6-5.4-2.8L6.3 19.6l1-6L3 9.4l6-.9z"/>
        </svg>
      </div>
      <span class="action-label" id="label-review">Google'da değerlendirin</span>
      <div class="action-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
    </a>

  </div>

  <footer>
    Kadıköy, İstanbul<br>
    <a href="https://www.instagram.com/marsespresso" target="_blank" rel="noopener">@marsespresso</a>
  </footer>

</div>

<script>
const S = {
  menu:    { tr: "Menüyü Gör",              en: "View Menu" },
  ig:      { tr: "Instagram",               en: "Instagram" },
  loyalty: { tr: "Sadakat kartı",           en: "Loyalty card" },
  review:  { tr: "Google'da değerlendirin", en: "Review us on Google" },
};
let lang = "tr";

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById("btn-tr").classList.toggle("active", l === "tr");
  document.getElementById("btn-en").classList.toggle("active", l === "en");
  document.getElementById("label-menu").textContent    = S.menu[l];
  document.getElementById("label-ig").textContent      = S.ig[l];
  document.getElementById("label-loyalty").textContent = S.loyalty[l];
  document.getElementById("label-review").textContent  = S.review[l];
}

if (navigator.language && navigator.language.startsWith("en")) setLang("en");
</script>
</body>
</html>
